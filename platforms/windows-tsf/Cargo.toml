[package]
name = "novatype-tsf"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true

[lib]
name = "novatype_tsf"
crate-type = ["cdylib", "rlib"]

[dependencies]
novatype-protocol = { path = "../../crates/novatype-protocol" }

[target.'cfg(windows)'.dependencies]
winreg = "0.52"

[lints.rust]
unsafe_code = "allow"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
